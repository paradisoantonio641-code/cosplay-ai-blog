name: Daily Cosplay Post

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Generate Post
        run: python scripts/generate_post.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'Cosplay Bot'
          git config --global user.email 'bot@cosplay.ai'
          git add .
          git commit -m "Nuovo articolo cosplay generato automaticamente"
          git push
