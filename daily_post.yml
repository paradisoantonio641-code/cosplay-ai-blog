name: Daily Cosplay Post

on:
  schedule:
    - cron: '0 10 * * *' # Gira ogni giorno alle 10:00 UTC
  workflow_dispatch: # Permette di avviarlo manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python_version: '3.11'

      - name: Install dependencies
        run: |
          pip install openai requests

      - name: Generate Post
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/generate_post.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'Cosplay Bot'
          git config --global user.email 'bot@cosplayblog.com'
          git add .
          git commit -m "Automated daily post: $(date +'%Y-%m-%d')"
          git push
