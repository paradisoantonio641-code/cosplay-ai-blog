---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%d %B %Y" }}</p>
  </header>

  {% if page.image %}
    <img src="{{ page.image | relative_url }}" alt="{{ page.title }}" class="post-image">
  {% endif %}

  <div class="post-content">
    {{ content }}
  </div>

  <div class="paypal-donation">
    <h3>Ti è piaciuto questo articolo? 💖</h3>
    <p>Supporta il mio lavoro con una piccola donazione per mantenere attivo il blog e la generazione di nuove immagini IA!</p>
    
    <form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_top">
      <input type="hidden" name="cmd" value="_xclick">
      <input type="hidden" name="business" value="antonored908@gmail.com">
      <input type="hidden" name="lc" value="IT">
      <input type="hidden" name="item_name" value="Supporto Blog Cosplay AI">
      <input type="hidden" name="button_subtype" value="services">
      <input type="hidden" name="no_note" value="0">
      <input type="hidden" name="currency_code" value="EUR">
      <input type="hidden" name="tax_rate" value="0.000">
      <input type="hidden" name="shipping" value="0.00">
      <input type="hidden" name="bn" value="PP-BuyNowBF:btn_buynowCC_LG.gif:NonHostedGuest">
      
      <label for="amount" style="display: block; margin-bottom: 10px; font-weight: bold;">Scegli l'importo (Min 1€ - Max 5€):</label>
      <select name="amount" id="amount" style="padding: 10px; border-radius: 5px; border: 1px solid #ccc; margin-bottom: 20px; font-size: 1em;">
        <option value="1.00">1,00 €</option>
        <option value="2.00">2,00 €</option>
        <option value="3.00">3,00 €</option>
        <option value="4.00">4,00 €</option>
        <option value="5.00">5,00 €</option>
      </select>
      <br>
      <button type="submit" class="paypal-button">Dona ora con PayPal</button>
    </form>
  </div>

</article>
