---
layout: default
title: Home
---

<div class="home">
  <h1 class="page-heading">Ultimi Articoli Cosplay</h1>

  <ul class="post-list">
    {% for post in site.posts %}
      <li>
        <span class="post-meta">{{ post.date | date: "%d %B %Y" }}</span>
        <h2>
          <a class="post-link" href="{{ post.url | relative_url }}">
            {{ post.title | escape }}
          </a>
        </h2>
        {% if post.image %}
          <img src="{{ post.image | relative_url }}" alt="{{ post.title }}" class="post-image">
        {% endif %}
        <div class="post-excerpt">
          {{ post.excerpt | strip_html | truncatewords: 50 }}
        </div>
        <a href="{{ post.url | relative_url }}" style="display: inline-block; margin-top: 10px; color: #6e8efb; font-weight: bold;">Leggi tutto &rarr;</a>
      </li>
    {% endfor %}
  </ul>
</div>
